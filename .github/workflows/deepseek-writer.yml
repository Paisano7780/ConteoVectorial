name: DeepSeek Coder - Write Code

# Este workflow se activa cuando recibe una señal desde fuera [citation:6]
on:
  repository_dispatch:
    types: [write-code]

jobs:
  write-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Crear rama para el Pull Request
        run: |
          # Extrae el nombre de la rama de los datos enviados por DeepSeek
          BRANCH_NAME="${{ github.event.client_payload.branch }}"
          git checkout -b $BRANCH_NAME
          git push --set-upstream origin $BRANCH_NAME

      - name: Escribir el código
        uses: actions/github-script@v7
        with:
          script: |
            // Decodificar el contenido del archivo enviado por DeepSeek
            const { file_path, file_content, commit_message, branch, pr_title, pr_body } = context.payload.client_payload;
            
            // Escribir el archivo
            const { exec } = require('child_process');
            const fs = require('fs');
            const util = require('util');
            const writeFile = util.promisify(fs.writeFile);
            
            await writeFile(file_path, Buffer.from(file_content, 'base64').toString('utf-8'));
            
            // Configurar Git, hacer commit y push
            exec(`git config user.name "DeepSeek Coder Bot"`);
            exec(`git config user.email "bot@deepseek.local"`);
            exec(`git add ${file_path}`);
            exec(`git commit -m "${commit_message}"`);
            exec(`git push`);

      - name: Crear Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          # Usar la API de GitHub para crear el PR [citation:2][citation:7]
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d '{
              "title": "${{ github.event.client_payload.pr_title }}",
              "body": "${{ github.event.client_payload.pr_body }}",
              "head": "${{ github.event.client_payload.branch }}",
              "base": "main"
            }'
