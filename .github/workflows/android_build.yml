name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK, CMake and platform packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;26.3.11579264" \
            "cmake;3.22.1"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Renombrar APK con numero de compilacion
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/VectorCount-b${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: VectorCount-b${{ github.run_number }}
          path: app/build/outputs/apk/debug/VectorCount-b${{ github.run_number }}.apk
          if-no-files-found: error

      - name: Publish APK to GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-b${{ github.run_number }}
          name: VectorCount Build ${{ github.run_number }}
          body: |
            Build automático del APK de depuración (assembleDebug).
            Generado desde el commit ${{ github.sha }}.
          files: app/build/outputs/apk/debug/VectorCount-b${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
